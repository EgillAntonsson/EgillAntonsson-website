<div class="playerContainer" (click)="onPlayStop()">
	<div class="playPauseContainer">
		<div [ngClass]="{play: !isPlaying, pause: isPlaying}"></div>
	</div>
	<span class="playerText">{{selectedTrack.name}}</span>
	<span class="timer playerText" [ngClass]="{fadein: isTrackReady}" *ngIf="isTrackReady">{{timeInSec | minutesSeconds }} / {{selectedTrack.durationInSec | minutesSeconds}}</span>
</div>

<div class="gainOuterContainer">
	<div class="labelContainer"><label>Master Volume</label></div>
<div class="muteOuterContainer" (click)="onMasterMuteChange()">
	<div class="muteInnerContainer">
			<div [ngClass]="{mute: masterMuted, unmute: !masterMuted, muteDisabled: gainsDisabledForView && masterMuted,  unmuteDisabled: gainsDisabledForView && !masterMuted}"></div>
	</div>
</div>
<div class="sliderContainer">
	<div class="slider">
		<ng5-slider [(value)]="masterGain" [options]="optionsMasterGain" (userChange)="onMasterGainChange($event)"></ng5-slider>
	</div>
</div>
</div>
